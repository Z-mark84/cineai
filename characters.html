<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色管理 - CineAI 角色与场景库</title>
  <meta name="description" content="CineAI 角色定义与记忆库 - 保证长视频角色一致性">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%237C3AED'/%3E%3Ctext x='16' y='23' text-anchor='middle' fill='white' font-size='22' font-weight='bold' font-family='sans-serif'%3EC%3C/text%3E%3C/svg%3E">
  <style>
    .char-hero { padding:calc(var(--nav-height)+var(--space-3xl)) 0 var(--space-2xl);text-align:center;background:var(--gradient-hero);}
    .char-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-lg);}
    .char-card { background:var(--bg-card);border:1px solid var(--border-color-light);border-radius:var(--border-radius-lg);overflow:hidden;transition:all var(--transition-base);}
    .char-card:hover { border-color:var(--border-color);transform:translateY(-2px);}
    .char-avatar { width:100%;height:200px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden;}
    .char-avatar img { width:100%;height:100%;object-fit:cover;}
    .char-body { padding:var(--space-md);}
    .char-body h3 { font-size:var(--font-size-base);font-weight:700;margin-bottom:4px;}
    .char-tags { display:flex;gap:4px;flex-wrap:wrap;margin:8px 0;}
    .char-tag { font-size:10px;padding:2px 8px;border-radius:var(--border-radius-full);background:var(--bg-elevated);color:var(--text-tertiary);}
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--border-radius-lg);width:90%;max-width:520px;max-height:90vh;overflow-y:auto;padding:var(--space-xl);}
    .modal-box h2 { font-size:var(--font-size-xl);font-weight:700;margin-bottom:var(--space-lg);}
    .form-group { margin-bottom:var(--space-md);}
    .form-group label { display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;}
    .form-group input,.form-group textarea,.form-group select { width:100%;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:8px;color:var(--text-primary);font-size:13px;outline:none;font-family:inherit;}
    .form-group textarea { min-height:80px;resize:vertical;}
    .scene-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-md);margin-top:var(--space-lg);}
    .scene-card-s { background:var(--bg-card);border:1px solid var(--border-color-light);border-radius:var(--border-radius-md);padding:var(--space-md);cursor:pointer;transition:all var(--transition-base);}
    .scene-card-s:hover { border-color:var(--border-color);}
    .scene-card-s h4 { font-size:13px;font-weight:600;}
    .scene-card-s p { font-size:11px;color:var(--text-tertiary);margin-top:4px;}
    .tabs-bar { display:flex;gap:0;margin-bottom:var(--space-xl);border-bottom:1px solid var(--border-color-light);}
    .tabs-bar .tab { padding:12px 24px;font-size:14px;font-weight:600;color:var(--text-tertiary);cursor:pointer;border-bottom:2px solid transparent;}
    .tabs-bar .tab.active { color:var(--color-primary-light);border-bottom-color:var(--color-primary);}
  </style>
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="nav-logo-icon">C</div>CineAI</a>
    <div class="nav-links">
      <a href="index.html">首页</a> <a href="apps.html">AI工具</a> <a href="create.html">长视频工作室</a>
      <a href="characters.html" class="active">角色库</a> <a href="image.html">AI图片</a>
      <a href="pricing.html">定价</a> <a href="about.html">关于</a>
    </div>
    <div class="nav-actions"><a href="create.html" class="btn btn-primary btn-sm"><i class="fas fa-wand-magic-sparkles"></i> 开始创作</a><button class="mobile-menu-btn"><i class="fas fa-bars"></i></button></div>
  </div></nav>
  <div class="mobile-menu">
    <a href="index.html">首页</a> <a href="apps.html">AI工具</a> <a href="create.html">长视频工作室</a>
    <a href="characters.html" class="active">角色库</a> <a href="image.html">AI图片</a>
    <a href="pricing.html">定价</a> <a href="about.html">关于</a>
    <a href="create.html" class="btn btn-primary" style="margin-top:16px;"><i class="fas fa-wand-magic-sparkles"></i> 开始创作</a>
  </div>

  <section class="char-hero">
    <div class="container">
      <span class="section-tag">模块4 · 角色管理</span>
      <h1 class="section-title">角色定义与记忆库</h1>
      <p class="section-subtitle">创建角色卡片，上传参考图，跨镜头保持角色一致</p>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="tabs-bar">
        <div class="tab active" onclick="switchCharTab('characters',this)">👤 角色库</div>
        <div class="tab" onclick="switchCharTab('scenes',this)">🌄 场景库</div>
      </div>

      <!-- Characters Tab -->
      <div id="charTab-characters">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg);">
          <span style="color:var(--text-secondary);font-size:var(--font-size-sm);"><span id="charCount">0</span> 个角色</span>
          <button class="btn btn-primary" onclick="openCharModal()"><i class="fas fa-plus"></i> 新建角色</button>
        </div>
        <div class="char-grid" id="charGrid"></div>
      </div>

      <!-- Scenes Tab -->
      <div id="charTab-scenes" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg);">
          <span style="color:var(--text-secondary);font-size:var(--font-size-sm);"><span id="sceneCount">0</span> 个场景</span>
          <button class="btn btn-primary" onclick="openSceneModal()"><i class="fas fa-plus"></i> 新建场景</button>
        </div>
        <div class="scene-grid" id="sceneGrid"></div>
      </div>
    </div>
  </section>

  <!-- Character Modal -->
  <div class="modal-overlay" id="charModal">
    <div class="modal-box">
      <h2><span id="charModalTitle">新建角色</span><span style="float:right;cursor:pointer;color:var(--text-tertiary);" onclick="closeCharModal()">✕</span></h2>
      <div class="form-group"><label>角色名称 *</label><input id="charName" placeholder="例如：李明"></div>
      <div class="form-group"><label>角色描述</label><textarea id="charDesc" placeholder="年龄、职业、性格特征等"></textarea></div>
      <div class="form-group"><label>性格标签</label><input id="charTags" placeholder="勇敢, 温柔, 幽默 (逗号分隔)"></div>
      <div class="form-group"><label>参考图</label><input type="file" accept="image/*" onchange="handleCharImage(this)" style="padding:8px;background:var(--bg-input);border:1px dashed var(--border-color);border-radius:8px;width:100%;color:var(--text-secondary);font-size:13px;"></div>
      <div id="charImagePreview" style="display:none;margin-bottom:var(--space-md);"><img id="charPreviewImg" style="max-height:120px;border-radius:8px;"></div>
      <input type="hidden" id="editCharId" value="">
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:var(--space-lg);">
        <button class="btn btn-ghost" onclick="closeCharModal()">取消</button>
        <button class="btn btn-primary" onclick="saveCharacter()">保存角色</button>
      </div>
    </div>
  </div>

  <!-- Scene Modal -->
  <div class="modal-overlay" id="sceneModal">
    <div class="modal-box">
      <h2><span>新建场景</span><span style="float:right;cursor:pointer;color:var(--text-tertiary);" onclick="closeSceneModal()">✕</span></h2>
      <div class="form-group"><label>场景名称 *</label><input id="sceneName" placeholder="例如：主角的家"></div>
      <div class="form-group"><label>场景类型</label><select id="sceneType"><option value="室内">室内</option><option value="室外">室外</option><option value="虚拟">虚拟/幻想</option></select></div>
      <div class="form-group"><label>场景描述</label><textarea id="sceneDesc" placeholder="环境细节、氛围、色彩基调等"></textarea></div>
      <div class="form-group"><label>关键词</label><input id="sceneKeywords" placeholder="现代, 温暖, 明亮 (逗号分隔)"></div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:var(--space-lg);">
        <button class="btn btn-ghost" onclick="closeSceneModal()">取消</button>
        <button class="btn btn-primary" onclick="saveScene()">保存场景</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container">
    <div class="footer-grid">
      <div class="footer-col"><a href="index.html" class="nav-logo"><div class="nav-logo-icon">C</div>CineAI</a><p class="footer-brand-desc">新一代AI视频创作平台</p></div>
      <div class="footer-col"><h4 class="footer-col-title">产品</h4><a href="apps.html">AI工具</a><a href="create.html">长视频工作室</a><a href="characters.html">角色库</a><a href="image.html">AI图片</a><a href="pricing.html">定价方案</a></div>
      <div class="footer-col"><h4 class="footer-col-title">公司</h4><a href="about.html">关于我们</a></div>
    </div>
    <div class="footer-bottom"><span>&copy; 2026 CineAI</span></div>
  </div></footer>

  <script>
    var CHAR_KEY = 'cineai_characters';
    var SCENE_KEY = 'cineai_scenes';
    var editingCharId = null;

    // ===== 角色管理 =====
    function getChars() { try { return JSON.parse(localStorage.getItem(CHAR_KEY)) || []; } catch(e) { return []; } }
    function saveChars(chars) { localStorage.setItem(CHAR_KEY, JSON.stringify(chars)); renderChars(); }

    function renderChars() {
      var chars = getChars();
      var grid = document.getElementById('charGrid');
      document.getElementById('charCount').textContent = chars.length;
      if (!chars.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-tertiary);"><i class="fas fa-users" style="font-size:48px;display:block;margin-bottom:16px;opacity:0.3;"></i><p>还没有角色，点击"新建角色"开始创建</p></div>'; return; }
      var html = '';
      for (var i = 0; i < chars.length; i++) {
        var c = chars[i];
        var tags = (c.tags || '').split(',').filter(function(t){return t.trim();});
        var tagHtml = tags.map(function(t){return '<span class="char-tag">' + t.trim() + '</span>';}).join('');
        html += '<div class="char-card">' +
          '<div class="char-avatar">' + (c.image ? '<img src="' + c.image + '">' : '<i class="fas fa-user-circle" style="opacity:0.3;"></i>') + '</div>' +
          '<div class="char-body"><h3>' + c.name + '</h3>' +
          '<div style="font-size:11px;color:var(--text-tertiary);">ID: ' + c.id + '</div>' +
          (c.desc ? '<p style="font-size:12px;color:var(--text-secondary);margin:8px 0;line-height:1.5;">' + c.desc.substring(0,100) + '</p>' : '') +
          (tagHtml ? '<div class="char-tags">' + tagHtml + '</div>' : '') +
          '<div style="display:flex;gap:8px;margin-top:8px;">' +
          '<button class="btn btn-ghost btn-sm" style="flex:1;" onclick="editCharacter(\'' + c.id + '\')"><i class="fas fa-edit"></i> 编辑</button>' +
          '<button class="btn btn-ghost btn-sm" style="flex:1;" onclick="deleteCharacter(\'' + c.id + '\')"><i class="fas fa-trash"></i> 删除</button></div></div></div>';
      }
      grid.innerHTML = html;
    }

    function openCharModal() { editingCharId = null; document.getElementById('editCharId').value = ''; document.getElementById('charModalTitle').textContent = '新建角色'; document.getElementById('charName').value = ''; document.getElementById('charDesc').value = ''; document.getElementById('charTags').value = ''; document.getElementById('charImagePreview').style.display = 'none'; window.charImageData = null; document.getElementById('charModal').classList.add('open'); }
    function closeCharModal() { document.getElementById('charModal').classList.remove('open'); }

    window.charImageData = null;
    function handleCharImage(input) {
      var file = input.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        window.charImageData = e.target.result;
        document.getElementById('charImagePreview').style.display = 'block';
        document.getElementById('charPreviewImg').src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function saveCharacter() {
      var name = document.getElementById('charName').value.trim();
      if (!name) { alert('请输入角色名称'); return; }
      var chars = getChars();
      var editId = document.getElementById('editCharId').value;
      if (editId) {
        for (var i = 0; i < chars.length; i++) { if (chars[i].id === editId) { chars[i].name = name; chars[i].desc = document.getElementById('charDesc').value.trim(); chars[i].tags = document.getElementById('charTags').value.trim(); if (window.charImageData) chars[i].image = window.charImageData; break; } }
      } else {
        chars.push({ id: 'CHAR-' + Date.now().toString(36).toUpperCase(), name: name, desc: document.getElementById('charDesc').value.trim(), tags: document.getElementById('charTags').value.trim(), image: window.charImageData || '', created: new Date().toLocaleString('zh-CN') });
      }
      saveChars(chars);
      closeCharModal();
      window.charImageData = null;
    }

    function editCharacter(id) {
      var chars = getChars();
      for (var i = 0; i < chars.length; i++) {
        if (chars[i].id === id) {
          editingCharId = id;
          document.getElementById('editCharId').value = id;
          document.getElementById('charModalTitle').textContent = '编辑角色';
          document.getElementById('charName').value = chars[i].name;
          document.getElementById('charDesc').value = chars[i].desc || '';
          document.getElementById('charTags').value = chars[i].tags || '';
          if (chars[i].image) { document.getElementById('charImagePreview').style.display = 'block'; document.getElementById('charPreviewImg').src = chars[i].image; }
          document.getElementById('charModal').classList.add('open');
          break;
        }
      }
    }

    function deleteCharacter(id) {
      if (!confirm('确定删除该角色？')) return;
      var chars = getChars().filter(function(c){ return c.id !== id; });
      saveChars(chars);
    }

    // ===== 场景管理 =====
    function getScenes() { try { return JSON.parse(localStorage.getItem(SCENE_KEY)) || []; } catch(e) { return []; } }
    function saveScenes(scenes) { localStorage.setItem(SCENE_KEY, JSON.stringify(scenes)); renderScenes(); }

    function renderScenes() {
      var scenes = getScenes();
      var grid = document.getElementById('sceneGrid');
      document.getElementById('sceneCount').textContent = scenes.length;
      if (!scenes.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-tertiary);"><i class="fas fa-image" style="font-size:48px;display:block;margin-bottom:16px;opacity:0.3;"></i><p>还没有场景，点击"新建场景"开始创建</p></div>'; return; }
      var html = '';
      for (var i = 0; i < scenes.length; i++) {
        var s = scenes[i];
        var typeMap = {室内:'🏠',室外:'🌳',虚拟:'✨'};
        html += '<div class="scene-card-s"><h4>' + (typeMap[s.type]||'🏠') + ' ' + s.name + '</h4><p>' + (s.desc ? s.desc.substring(0,80) : '') + '</p><div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-ghost btn-sm" style="flex:1;" onclick="deleteScene(\'' + s.id + '\')"><i class="fas fa-trash"></i></button></div></div>';
      }
      grid.innerHTML = html;
    }

    function openSceneModal() { document.getElementById('sceneName').value=''; document.getElementById('sceneType').value='室内'; document.getElementById('sceneDesc').value=''; document.getElementById('sceneKeywords').value=''; document.getElementById('sceneModal').classList.add('open'); }
    function closeSceneModal() { document.getElementById('sceneModal').classList.remove('open'); }

    function saveScene() {
      var name = document.getElementById('sceneName').value.trim();
      if (!name) { alert('请输入场景名称'); return; }
      var scenes = getScenes();
      scenes.push({ id: 'SCENE-' + Date.now().toString(36).toUpperCase(), name: name, type: document.getElementById('sceneType').value, desc: document.getElementById('sceneDesc').value.trim(), keywords: document.getElementById('sceneKeywords').value.trim(), created: new Date().toLocaleString('zh-CN') });
      saveScenes(scenes);
      closeSceneModal();
    }

    function deleteScene(id) {
      if (!confirm('确定删除？')) return;
      saveScenes(getScenes().filter(function(s){ return s.id !== id; }));
    }

    function switchCharTab(tab, btn) {
      document.querySelectorAll('.tabs-bar .tab').forEach(function(t){ t.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('charTab-characters').style.display = tab === 'characters' ? 'block' : 'none';
      document.getElementById('charTab-scenes').style.display = tab === 'scenes' ? 'block' : 'none';
    }

    renderChars();
    renderScenes();
  </script>
</body>
</html>
