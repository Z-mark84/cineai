<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作中心 - CineAI AI长视频创作平台</title>
  <meta name="description" content="CineAI 创作中心 - 使用AI智能生成高质量长视频，支持文生视频、图生视频、智能编辑">

  <!-- Open Graph -->
  <meta property="og:title" content="创作中心 - CineAI AI长视频创作平台">
  <meta property="og:description" content="CineAI 创作中心 - 使用AI智能生成高质量长视频">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://cineai.ai/og-image.png">
  <meta property="og:url" content="https://cineai.ai/create">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%237C3AED'/%3E%3Ctext x='16' y='23' text-anchor='middle' fill='white' font-size='22' font-weight='bold' font-family='sans-serif'%3EC%3C/text%3E%3C/svg%3E">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">C</div>
        CineAI
      </a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="create.html" class="active">创作中心</a>
        <a href="pricing.html">定价</a>
        <a href="about.html">关于我们</a>
      </div>
      <div class="nav-actions">
        <a href="create.html" class="btn btn-primary btn-sm">
          <i class="fas fa-wand-magic-sparkles"></i> 开始创作
        </a>
        <button class="mobile-menu-btn" aria-label="打开菜单">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu">
    <a href="index.html">首页</a>
    <a href="create.html" class="active">创作中心</a>
    <a href="pricing.html">定价方案</a>
    <a href="about.html">关于我们</a>
    <a href="create.html" class="btn btn-primary" style="margin-top:16px;text-align:center;border-bottom:none;">
      <i class="fas fa-wand-magic-sparkles"></i> 开始创作
    </a>
  </div>

  <!-- Create Layout -->
  <div class="create-layout">
    <!-- Sidebar -->
    <aside class="create-sidebar">
      <div class="create-sidebar-section">
        <h3 class="create-sidebar-title">创作工具</h3>
        <div class="create-tool-item active">
          <div class="create-tool-icon" style="background:rgba(124,58,237,0.15);color:var(--color-primary-light);">
            <i class="fas fa-pen-fancy"></i>
          </div>
          <span>文生视频</span>
        </div>
        <div class="create-tool-item">
          <div class="create-tool-icon" style="background:rgba(6,182,212,0.15);color:var(--color-accent-light);">
            <i class="fas fa-image"></i>
          </div>
          <span>图生视频</span>
        </div>
        <div class="create-tool-item">
          <div class="create-tool-icon" style="background:rgba(34,197,94,0.15);color:#4ADE80;">
            <i class="fas fa-scissors"></i>
          </div>
          <span>视频编辑</span>
        </div>
        <div class="create-tool-item">
          <div class="create-tool-icon" style="background:rgba(249,115,22,0.15);color:#FB923C;">
            <i class="fas fa-microphone"></i>
          </div>
          <span>配音音效</span>
        </div>
        <div class="create-tool-item">
          <div class="create-tool-icon" style="background:rgba(236,72,153,0.15);color:#F472B6;">
            <i class="fas fa-user-check"></i>
          </div>
          <span>角色管理</span>
        </div>
      </div>
      
      <div class="create-sidebar-section">
        <h3 class="create-sidebar-title">历史记录</h3>
        <div style="font-size:var(--font-size-sm);color:var(--text-tertiary);padding:var(--space-md);text-align:center;">
          <i class="fas fa-clock" style="font-size:24px;margin-bottom:8px;display:block;opacity:0.3;"></i>
          暂无生成记录
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="create-main">
      <div class="create-header">
        <div>
          <h2><i class="fas fa-pen-fancy" style="color:var(--color-primary-light);margin-right:8px;"></i>文生视频</h2>
          <p style="color:var(--text-tertiary);font-size:var(--font-size-sm);margin-top:4px;">
            用文字描述你的创意，AI 自动生成视频
          </p>
        </div>
        <div class="create-credits">
          <i class="fas fa-coins" style="color:var(--color-accent);"></i>
          剩余次数: <span style="color:var(--text-primary);font-weight:700;">128</span>
          <a href="pricing.html" style="font-size:12px;color:var(--color-primary-light);">升级</a>
        </div>
      </div>

      <!-- Input Area -->
      <div class="create-input-area">
        <textarea placeholder="详细描述你想要的视频内容...&#10;&#10;例如：一个科幻风格的未来城市，高楼大厦间飞行器穿梭，傍晚时分霓虹灯闪烁，镜头缓慢推进穿过街道..."></textarea>
        <div class="create-input-tools">
          <div class="create-input-actions">
            <button class="btn btn-ghost btn-sm" title="上传参考图片">
              <i class="fas fa-image"></i> 参考图
            </button>
            <button class="btn btn-ghost btn-sm" title="使用模板">
              <i class="fas fa-template"></i> 模板
            </button>
            <button class="btn btn-ghost btn-sm" title="AI辅助写提示词">
              <i class="fas fa-wand-magic-sparkles"></i> 帮我写
            </button>
          </div>
          <span style="font-size:var(--font-size-xs);color:var(--text-tertiary);">0/2000</span>
        </div>
      </div>

      <!-- Parameters -->
      <div class="create-params">
        <div class="param-group">
          <label class="param-label">AI 模型</label>
          <select class="param-select" id="modelSelect">
            <option value="cineai-pro">CineAI Pro (推荐)</option>
            <option value="cineai-turbo">CineAI Turbo (快速)</option>
            <option value="cineai-studio">CineAI Studio (高质量)</option>
            <option value="cineai-anime">CineAI Anime (动漫风格)</option>
          </select>
        </div>
        
        <div class="param-group">
          <label class="param-label">视频时长</label>
          <div class="param-value">
            <i class="fas fa-clock" style="color:var(--text-tertiary);"></i>
            <span class="param-value-num">30</span><span style="font-weight:400;color:var(--text-tertiary);">秒</span>
          </div>
          <input type="range" class="param-slider" id="durationSlider" min="5" max="180" value="30" step="5" aria-label="视频时长" aria-valuemin="5" aria-valuemax="180" aria-valuenow="30">
        </div>
        
        <div class="param-group">
          <label class="param-label">分辨率</label>
          <select class="param-select" id="qualitySelect">
            <option value="720p">720p (高清)</option>
            <option value="1080p" selected>1080p (全高清)</option>
            <option value="4k">4K (超高清)</option>
          </select>
        </div>
        
        <div class="param-group">
          <label class="param-label">风格</label>
          <select class="param-select" id="styleSelect">
            <option value="cinematic">电影质感</option>
            <option value="natural">自然真实</option>
            <option value="anime">动漫风格</option>
            <option value="painting">油画风格</option>
            <option value="cyberpunk">赛博朋克</option>
          </select>
        </div>
      </div>

      <!-- Generate & Preview -->
      <button class="btn btn-primary btn-lg" id="generateBtn" style="width:100%;margin-bottom:var(--space-lg);">
        <i class="fas fa-wand-magic-sparkles"></i> 开始生成
      </button>

      <div class="create-preview">
        <div class="create-preview-empty">
          <div class="create-preview-empty-icon">
            <i class="fas fa-video"></i>
          </div>
          <h3>等待创作</h3>
          <p style="color:var(--text-tertiary);font-size:var(--font-size-sm);">
            输入视频描述，点击「开始生成」预览效果
          </p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
