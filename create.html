              '<div class="scene-num">' + (i+1) + '</div>' +
              '<div class="scene-status ' + statusClass + '"></div>' +
              '<div><div style="font-size:13px;font-weight:600;">йХЬе§і ' + (i+1) + '</div><div style="font-size:11px;color:var(--text-tertiary);">' + s.duration + 'зІ?¬Ј ' + statusLabel + '</div></div>' +
            '</div>' +
            '<div style="display:flex;gap:8px;align-items:center;">' +
              (s.status === 'pending' ? '<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();generateScene(' + i + ')"><i class="fas fa-play"></i> зФЯжИР</button>' : '') +
              (s.status === 'done' ? '<span style="color:#4ADE80;font-size:13px;"><i class="fas fa-check-circle"></i></span>' : '') +
              '<i class="fas fa-chevron-down" style="color:var(--text-tertiary);font-size:12px;transition:transform 0.2s;' + (s.expanded ? 'transform:rotate(180deg);' : '') + '"></i>' +
            '</div>' +
          '</div>' +
          '<div style="' + (s.expanded ? '' : 'display:none;') + 'padding:0 16px 16px;">' +
            '<textarea style="width:100%;min-height:80px;background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:6px;padding:12px;color:var(--text-primary);font-size:13px;line-height:1.6;resize:vertical;outline:none;font-family:inherit;" onchange="updateScenePrompt(' + i + ', this.value)">' + s.prompt + '</textarea>' +
            '<div style="display:flex;justify-content:space-between;margin-top:8px;">' +
              '<div style="display:flex;gap:8px;">' +
                '<button class="btn btn-ghost btn-sm" onclick="generateScene(' + i + ')"><i class="fas fa-play"></i> ' + (s.status === 'done' ? 'йЗНжЦ∞зФЯжИР' : 'зФЯжИР') + '</button>' +
                (s.status === 'done' ? '<button class="btn btn-ghost btn-sm" style="color:#4ADE80;"><i class="fas fa-eye"></i> йҐДиД1§7</button>' : '') +
              '</div>' +
              '<div style="display:flex;gap:8px;align-items:center;">' +
                '<span style="font-size:11px;color:var(--text-tertiary);">жЧґйХњ:</span>' +
                '<input type="number" value="' + s.duration + '" min="5" max="15" onchange="updateSceneDuration(' + i + ', this.value)" style="width:50px;background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:4px;padding:4px 8px;color:var(--text-primary);font-size:12px;outline:none;">' +
                '<span style="font-size:11px;color:var(--text-tertiary);">зІ?/span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }
      container.innerHTML = html;
    }

    function renderMiniList() {
      var container = document.getElementById('sceneMiniList');
      if (!scenes.length) { container.innerHTML = '<div style="padding:16px;color:var(--text-tertiary);font-size:12px;text-align:center;">еЕИжЛЖеИЖиДЪжЬ?/div>'; return; }
      var html = '';
      for (var i = 0; i < scenes.length; i++) {
        var s = scenes[i];
        var dotColor = {pending:'var(--text-tertiary)', generating:'var(--color-accent)', done:'#22C55E', error:'#EF4444'}[s.status] || 'var(--text-tertiary)';
        html += '<div class="scene-mini' + (i === activeSceneIndex ? ' active' : '') + '" onclick="activeSceneIndex=' + i + ';renderMiniList();document.getElementById(\'scene-\' + ' + i + ').scrollIntoView({behavior:\'smooth\'})">' +
          '<div class="status-dot" style="background:' + dotColor + '"></div>' +
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">йХЬе§і' + (i+1) + ': ' + s.prompt.substring(0, 20) + '</span>' +
          '<span style="font-size:10px;color:var(--text-tertiary);">' + s.duration + 's</span>' +
        '</div>';
      }
      container.innerHTML = html;
    }

    function toggleScene(i) { scenes[i].expanded = !scenes[i].expanded; renderSceneList(); }
    function updateScenePrompt(i, v) { scenes[i].prompt = v; }
    function updateSceneDuration(i, v) { scenes[i].duration = Math.max(5, Math.min(15, parseInt(v) || 5)); updateSceneInfo(); renderSceneList(); renderMiniList(); }

    function generateScene(i) {
      scenes[i].status = 'generating';
      renderSceneList(); renderMiniList(); updateProgress();
      
      setTimeout(function() {
        scenes[i].status = 'done';
        scenes[i].genTime = (2 + Math.random() * 4).toFixed(1);
        renderSceneList(); renderMiniList(); updateProgress(); updateSceneInfo();
      }, 2000 + Math.random() * 2000);
    }

    function generateAllScenes() {
      var btn = document.getElementById('generateAllBtn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> зФЯжИРдЄ?..';
      btn.disabled = true;
      
      var idx = 0;
      function next() {
        if (idx >= scenes.length) {
          btn.innerHTML = '<i class="fas fa-play"></i> зФЯжИРеЕ®йГ®йХЬе§і';
          btn.disabled = false;
          updateSceneInfo();
          return;
        }
        scenes[idx].status = 'generating';
        renderSceneList(); renderMiniList(); updateProgress();
        
        setTimeout(function() {
          scenes[idx].status = 'done';
          scenes[idx].genTime = (2 + Math.random() * 3).toFixed(1);
          renderSceneList(); renderMiniList(); updateProgress();
          idx++;
          setTimeout(next, 500);
        }, 1500 + Math.random() * 2000);
      }
      next();
    }

    function updateProgress() {
      var done = scenes.filter(function(s){ return s.status === 'done'; }).length;
      var pct = scenes.length ? (done / scenes.length * 100) : 0;
      var bar = document.getElementById('progressBar');
      if (bar) bar.style.width = pct + '%';
      var dc = document.getElementById('doneCount');
      if (dc) dc.textContent = done;
      var tc = document.getElementById('totalCount');
      if (tc) tc.textContent = scenes.length;
    }

    function updateSceneInfo() {
      var total = 0;
      var done = 0;
      for (var i = 0; i < scenes.length; i++) {
        total += scenes[i].duration;
        if (scenes[i].status === 'done') done++;
      }
      var info = document.getElementById('sceneTabInfo');
      if (info) info.textContent = scenes.length + 'дЄД1§7ХЬе§?¬Ј йҐДдЉ∞жАїжЧґйХ? + total + 'зІ?;
      var durDisp = document.getElementById('totalDurationDisplay');
      if (durDisp) durDisp.textContent = 'зЫД1§7†З: ' + total + 'зІ?| еЈ≤еЃМжИ? ' + done + '/' + scenes.length;
    }

    var currentTab = 'script';
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.studio-tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-tab') === tab); });
      ['script','scenes','preview'].forEach(function(t) {
        var el = document.getElementById('tab-' + t);
        if (el) el.style.display = t === tab ? 'block' : 'none';
      });
      if (tab === 'scenes') renderSceneList();
      if (tab === 'preview') renderAssembly();
    }

    function renderAssembly() {
      var container = document.getElementById('assemblyPreview');
      if (!scenes.length) { container.innerHTML = '<div style="font-size:48px;margin-bottom:16px;opacity:0.3;"><i class="fas fa-film"></i></div><h3 style="color:var(--text-secondary);margin-bottom:8px;">иѓЈеЕИжЛЖеИЖиДЪжЬђ</h3><p style="color:var(--text-tertiary);font-size:var(--font-size-sm);">еЬ®иДЪжЬД1§7†Зз≠ЊдЄ≠иЊУеЕ•еєґжЛЖеИ?/p>'; return; }
      
      var allDone = scenes.every(function(s){ return s.status === 'done'; });
      if (!allDone) { container.innerHTML = '<div style="font-size:48px;margin-bottom:16px;opacity:0.3;"><i class="fas fa-hourglass-half"></i></div><h3 style="color:var(--text-secondary);margin-bottom:8px;">з≠ЙеЊЕжЙҐгжЬЙйХЬе§ізФЯжИРеЃМжИ?/h3><p style="color:var(--text-tertiary);font-size:var(--font-size-sm);">еЈ≤еЃМжИ?' + scenes.filter(function(s){return s.status==='done';}).length + '/' + scenes.length + ' дЄД1§7ХЬе§?/p>'; return; }
      
      var totalDur = 0;
      scenes.forEach(function(s){ totalDur += s.duration; });
      
      container.innerHTML = '<div style="width:100%;">' +
        '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">' +
          '<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:12px 20px;text-align:center;"><div style="font-size:24px;font-weight:800;color:#4ADE80;">' + totalDur + 's</div><div style="font-size:11px;color:var(--text-tertiary);">жАїжЧґйХ?/div></div>' +
          '<div style="background:var(--bg-card);border:1px solid var(--border-color-light);border-radius:8px;padding:12px 20px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + scenes.length + '</div><div style="font-size:11px;color:var(--text-tertiary);">йХЬе§іжХ?/div></div>' +
          '<div style="background:var(--bg-card);border:1px solid var(--border-color-light);border-radius:8px;padding:12px 20px;text-align:center;"><div style="font-size:24px;font-weight:800;">' + scenes[0].quality + '</div><div style="font-size:11px;color:var(--text-tertiary);">еИЖиЊ®зО?/div></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;">';
      for (var i = 0; i < scenes.length; i++) {
        container.innerHTML += '<div style="flex-shrink:0;width:160px;background:var(--bg-card);border:1px solid var(--border-color-light);border-radius:8px;overflow:hidden;">' +
          '<div style="aspect-ratio:16/9;background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(6,182,212,0.1));display:flex;align-items:center;justify-content:center;font-size:24px;">вЦґпЄП</div>' +
          '<div style="padding:8px;"><div style="font-size:11px;font-weight:600;">йХЬе§і' + (i+1) + '</div><div style="font-size:10px;color:var(--text-tertiary);">' + scenes[i].duration + 's</div></div>' +
        '</div>';
      }
      container.innerHTML += '</div>' +
        '<div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" onclick="alert(\'рЯОђ еѓЉеЗЇеРИжИРиІЖйД1§7\\n\\n' + scenes.length + 'дЄД1§7ХЬе§?¬Ј ' + totalDur + 'зІТ\\nеИЖиЊ®зО? 1080p\\nж†ЉеЉП: MP4 H.264\\n\\nпЉИжЉФз§Їж®°еЉПпЉМеЃЮйЩЕеѓЉеЗЇйЬҐгжО•еЕ•APIпЉЙ\')"><i class="fas fa-download"></i> еѓЉеЗЇеЃМжХіиІЖйД1§7 (' + totalDur + 'зІ?</button></div>' +
      '</div>';
    }

    // Event bindings
    document.getElementById('generateAllBtn').addEventListener('click', generateAllScenes);
    document.getElementById('exportBtn').addEventListener('click', function(){ switchTab('preview'); });
    document.getElementById('projectTitleInput').addEventListener('input', function(){
      document.getElementById('projectName').textContent = this.value || 'жЬД1§7СљеРНй°єзЫ?;
    });

    // Init with demo
    window.onload = function() {
      setTimeout(function() {
        useDemoScript();
      }, 500);
    };
  </script>
</body>
</html>
