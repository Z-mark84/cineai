<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长视频工作室 - CineAI 一站式长视频创作</title>
  <meta name="description" content="CineAI 一站式长视频工作室：脚本拆解→多镜头生成→链式扩展→智能拼接">
  <meta property="og:title" content="长视频工作室 - CineAI">
  <meta property="og:description" content="一站式AI长视频创作">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:;">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%237C3AED'/%3E%3Ctext x='16' y='23' text-anchor='middle' fill='white' font-size='22' font-weight='bold' font-family='sans-serif'%3EC%3C/text%3E%3C/svg%3E">
  <style>
    .studio { display:flex; flex-direction:column; min-height:100vh; padding-top:var(--nav-height); background:var(--bg-primary); }
    .studio-topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:var(--bg-secondary); border-bottom:1px solid var(--border-color-light); }
    .studio-topbar h1 { font-size:var(--font-size-lg); font-weight:700; display:flex; align-items:center; gap:8px; }
    .studio-body { display:flex; flex:1; overflow:hidden; }
    .studio-sidebar { width:320px; background:var(--bg-secondary); border-right:1px solid var(--border-color-light); display:flex; flex-direction:column; flex-shrink:0; }
    .studio-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .studio-tabs { display:flex; border-bottom:1px solid var(--border-color-light); background:var(--bg-primary); padding:0 16px; }
    .studio-tab { padding:12px 20px; font-size:var(--font-size-sm); font-weight:600; color:var(--text-tertiary); cursor:pointer; border-bottom:2px solid transparent; transition:all var(--transition-fast); }
    .studio-tab.active { color:var(--color-primary-light); border-bottom-color:var(--color-primary); }
    .studio-content { flex:1; overflow-y:auto; padding:20px 24px; }
    .scene-card { background:var(--bg-card); border:1px solid var(--border-color-light); border-radius:var(--border-radius-md); margin-bottom:12px; overflow:hidden; transition:all var(--transition-base); }
    .scene-card-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; }
    .scene-num { width:28px;height:28px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0; }
    .scene-status { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .scene-status.pending { background:var(--text-tertiary); }
    .scene-status.generating { background:var(--color-accent); animation:pulse-dot 1s infinite; }
    .scene-status.done { background:#22C55E; }
  </style>
</head>
<body>
  <nav class="nav"><div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="nav-logo-icon">C</div>CineAI</a>
    <div class="nav-links">
      <a href="index.html">首页</a> <a href="apps.html">AI工具</a> <a href="workflow.html">协作工作流</a>
      <a href="create.html" class="active">长视频工作室</a> <a href="image.html">AI图片</a> <a href="characters.html">角色库</a> <a href="pricing.html">定价</a> <a href="help.html">帮助</a> <a href="showcase.html">案例</a> <a href="about.html">关于</a>
    </div>
  </div></nav>
  
  <div class="studio">
    <div class="studio-topbar">
      <h1><i class="fas fa-film" style="color:var(--color-primary-light);"></i> <span id="projectName">未命名项目</span></h1>
      <div><button class="btn btn-primary btn-sm" id="generateAllBtn"><i class="fas fa-play"></i> 生成全部镜头</button></div>
    </div>
    <div class="studio-body">
      <div class="studio-sidebar">
        <div class="studio-sb-section">
          <h3>项目设置</h3>
          <input id="projectTitleInput" value="我的长视频" style="background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px;outline:none;width:100%;margin-bottom:8px;" placeholder="项目名称">
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <input id="totalDurationInput" type="number" value="60" min="30" max="600" style="background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px;outline:none;width:70px;" placeholder="秒">
            <select id="sceneCountSelect" style="background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:6px;padding:8px;color:var(--text-primary);font-size:13px;outline:none;flex:1;">
              <option value="4">4镜头</option><option value="6" selected>6镜头</option><option value="8">8镜头</option>
            </select>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="splitScript()" style="width:100%;"><i class="fas fa-scissors"></i> 拆分为镜头</button>
        </div>
        <div class="studio-sb-section">
          <h3>进度</h3>
          <div class="total-bar"><div class="total-bar-fill" id="progressBar" style="width:0%"></div></div>
          <div style="font-size:11px;color:var(--text-tertiary);"><span id="doneCount">0</span>/<span id="totalCount">0</span></div>
        </div>
        <div class="scene-list-scroll" id="sceneMiniList"></div>
      </div>
      <div class="studio-main">
        <div class="studio-tabs">
          <div class="studio-tab active" data-tab="script" onclick="switchTab('script')">📝 脚本</div>
          <div class="studio-tab" data-tab="scenes" onclick="switchTab('scenes')">🎬 镜头</div>
          <div class="studio-tab" data-tab="preview" onclick="switchTab('preview')">🎞️ 预览</div>
        </div>
        <div class="studio-content">
          <div id="tab-script">
            <h3>视频脚本</h3>
            <textarea id="scriptInput" style="width:100%;min-height:260px;background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:8px;padding:16px;color:var(--text-primary);font-size:14px;line-height:1.8;resize:vertical;outline:none;font-family:inherit;" placeholder="输入完整视频脚本...例如：清晨的阳光洒在湖面上，薄雾升起，一只白鹭飞过水面..."></textarea>
            <div style="margin-top:12px;"><button class="btn btn-primary" onclick="splitScript()"><i class="fas fa-scissors"></i> 拆分为镜头</button></div>
          </div>
          <div id="tab-scenes" style="display:none;"><div id="sceneListContainer"></div></div>
          <div id="tab-preview" style="display:none;"><div class="assembly-preview" id="assemblyPreview"><h3>等待镜头生成</h3></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var scenes = [];
    function splitScript() {
      var text = document.getElementById('scriptInput').value.trim();
      if (!text) { alert('请先输入视频脚本'); return; }
      var parts = text.split('\n').filter(function(p){ return p.trim(); });
      var count = parseInt(document.getElementById('sceneCountSelect').value);
      var totalDur = parseInt(document.getElementById('totalDurationInput').value) || 60;
      var perScene = Math.round(parts.length / count);
      scenes = [];
      for (var i = 0; i < count; i++) {
        var g = [];
        for (var j = i * perScene; j < (i + 1) * perScene && j < parts.length; j++) g.push(parts[j].replace(/【[^】]*】/g,'').trim());
        var p = g.join('，') || ('场景' + (i+1));
        scenes.push({ id:i, prompt:p, duration:Math.max(5,Math.min(15,Math.round(totalDur/count))), status:'pending', expanded:i===0 });
      }
      renderScenes(); renderMini(); updateProgress(); switchTab('scenes');
    }
    function renderScenes() {
      var c = document.getElementById('sceneListContainer');
      if (!scenes.length) { c.innerHTML = '<div style="padding:40px;color:var(--text-tertiary);text-align:center;">请先在脚本页拆分</div>'; return; }
      var h = '';
      for (var i = 0; i < scenes.length; i++) {
        var s = scenes[i];
        h += '<div class="scene-card"><div class="scene-card-header" onclick="scenes[' + i + '].expanded=!scenes[' + i + '].expanded;renderScenes()"><div class="scene-num">' + (i+1) + '</div><div style="flex:1;font-size:13px;font-weight:600;">镜头' + (i+1) + ' · ' + s.duration + 's</div><span style="font-size:11px;color:var(--text-tertiary);">' + {pending:'待生成',generating:'生成中',done:'已完成'}[s.status] + '</span></div>' +
        '<div style="display:' + (s.expanded?'block':'none') + ';padding:0 16px 16px;"><textarea style="width:100%;min-height:60px;background:var(--bg-input);border:1px solid var(--border-color-light);border-radius:6px;padding:12px;color:var(--text-primary);font-size:13px;outline:none;font-family:inherit;" onchange="scenes[' + i + '].prompt=this.value">' + s.prompt + '</textarea>' +
        '<div style="margin-top:8px;"><button class="btn btn-primary btn-sm" onclick="genScene(' + i + ')"><i class="fas fa-play"></i> 生成</button></div></div></div>';
      }
      c.innerHTML = h;
    }
    function renderMini() {
      var c = document.getElementById('sceneMiniList');
      if (!scenes.length) { c.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text-tertiary);text-align:center;">先拆分脚本</div>'; return; }
      var h = '';
      for (var i = 0; i < scenes.length; i++) {
        h += '<div class="scene-mini"><div class="status-dot" style="background:' + {pending:'var(--text-tertiary)',generating:'var(--color-accent)',done:'#22C55E'}[scenes[i].status] + '"></div><span style="flex:1;font-size:12px;">镜头' + (i+1) + '</span><span style="font-size:10px;color:var(--text-tertiary);">' + scenes[i].duration + 's</span></div>';
      }
      c.innerHTML = h;
    }
    function genScene(i) {
      scenes[i].status = 'generating'; renderScenes(); renderMini();
      setTimeout(function(){ scenes[i].status = 'done'; renderScenes(); renderMini(); updateProgress(); }, 2000);
    }
    function updateProgress() {
      var done = scenes.filter(function(s){return s.status==='done';}).length;
      document.getElementById('progressBar').style.width = (scenes.length ? (done/scenes.length*100) : 0) + '%';
      document.getElementById('doneCount').textContent = done;
      document.getElementById('totalCount').textContent = scenes.length;
    }
    function switchTab(t) {
      document.querySelectorAll('.studio-tab').forEach(function(tab){ tab.classList.toggle('active',tab.getAttribute('data-tab')===t); });
      document.getElementById('tab-script').style.display = t==='script'?'block':'none';
      document.getElementById('tab-scenes').style.display = t==='scenes'?'block':'none';
      document.getElementById('tab-preview').style.display = t==='preview'?'block':'none';
      if (t==='scenes') renderScenes();
    }
    document.getElementById('generateAllBtn').addEventListener('click',function(){
      for (var i = 0; i < scenes.length; i++) genScene(i);
    });
  </script>
</body>
</html>
